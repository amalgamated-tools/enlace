  /api/v1/me/oidc/callback:
    get:
      description: Handles the OAuth 2.0 callback for account linking. Verifies state,
        exchanges the code, and links the OIDC identity to the current user account.
      parameters:
      - description: Authorization code
        in: query
        name: code
        required: true
