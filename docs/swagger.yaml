          schema:
            $ref: '#/definitions/internal_handler.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - admin
    get:
      description: Requires admin role.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
