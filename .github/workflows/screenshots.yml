name: Update Screenshots

on:
  push:
    branches: [main]

concurrency:
  group: screenshots
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    name: Retake Screenshots
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

      - name: Set up Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version: stable

      - name: Build Go binary
        run: go build -o enlace ./cmd/enlace

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Start server and take screenshots
        run: |
          mkdir -p screenshots
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/data" "$TMPDIR/uploads"
          PORT=8080 \
          DATABASE_PATH="$TMPDIR/screenshots.db" \
          DATA_DIR="$TMPDIR/data" \
          STORAGE_TYPE="local" \
          STORAGE_LOCAL_PATH="$TMPDIR/uploads" \
          ./enlace &
          SERVER_PID=$!

          echo "Waiting for server to be ready..."
          for i in $(seq 1 60); do
            if curl --fail --silent --show-error -o /dev/null http://localhost:8080/health; then
              echo "Server ready."
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for server"
              kill $SERVER_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          cd e2e && node ../scripts/take-screenshots.mjs
          RESULT=$?
          kill $SERVER_PID 2>/dev/null
          exit $RESULT
        env:
          BASE_URL: http://localhost:8080

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update screenshots"
          title: "Update screenshots"
          body: |
            Auto-generated screenshot update.

            This PR was created because the screenshots in `screenshots/` changed
            after rebuilding the app from the latest code on main.
          base: ${{ github.head_ref || github.ref_name }}
          branch: auto/screenshots
          delete-branch: true
          add-paths: screenshots/
